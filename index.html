<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Testing Webku</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            font-family: 'Inter', sans-serif;
            color: #f1f1f1;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            border-bottom: 1px solid #272727;
            padding-bottom: 16px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF 0%, #aaaaaa 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .premium-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 0.5px solid #3a3a3a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .premium-badge i {
            color: #ff4d4d;
        }
        .player-card {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #2c2c2c;
            margin-bottom: 32px;
        }
        .video-container {
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .empty-state {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #aaa;
            gap: 16px;
        }
        .empty-state i {
            font-size: 64px;
            opacity: 0.5;
        }
        .control-bar {
            padding: 20px 28px;
            background: #141414;
            border-top: 1px solid #2c2c2c;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }
        .input-area {
            flex: 3;
            min-width: 220px;
        }
        .input-area label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .input-box {
            display: flex;
            align-items: center;
            background: #0f0f0f;
            border-radius: 48px;
            border: 1px solid #333;
            padding: 4px 8px 4px 20px;
        }
        .input-box:focus-within {
            border-color: #ff4d4d;
            box-shadow: 0 0 0 2px rgba(255,77,77,0.2);
        }
        .input-box i {
            color: #777;
            margin-right: 8px;
        }
        #kode {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 8px;
            font-size: 0.95rem;
            color: white;
            font-family: 'Inter', monospace;
            outline: none;
        }
        .buttons {
            display: flex;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .btn-play {
            background: #ff4d4d;
            color: white;
        }
        .btn-play:hover {
            background: #e33e3e;
        }
        .btn-clear {
            background: #1e1e1e;
            border: 1px solid #4a2a2a;
            color: #ff8888;
        }
        .btn-clear:hover {
            background: #2a1a1a;
        }
        .info-bar {
            background: #121212;
            border-radius: 20px;
            padding: 16px 24px;
            border: 1px solid #262626;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .status {
            background: #1e2a1e;
            padding: 6px 12px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #7bff7b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .kode-display {
            font-family: monospace;
            background: #0a0a0a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #b0b0b0;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: #494949;
            border-top: 1px solid #202020;
            padding-top: 24px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
        button:active {
            transform: scale(0.96);
        }
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2c2c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 0.85rem;
            color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            animation: fadeUp 0.2s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @media (max-width: 720px) {
            .app {
                padding: 16px;
            }
            .control-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .buttons {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>testing webku</h1>
        <div class="premium-badge">
            <i class="fas fa-crown"></i>
            <span>premium</span>
        </div>
    </div>

    <div class="player-card">
        <div class="video-container" id="videoContainer">
            <div id="playerWrapper" style="width:100%; height:100%;"></div>
        </div>
        <div class="control-bar">
            <div class="input-area">
                <label><i class="fas fa-key"></i> MASUKKAN KODE</label>
                <div class="input-box">
                    <i class="fas fa-code"></i>
                    <input type="text" id="kode" placeholder="contoh: abc123" autocomplete="off">
                </div>
            </div>
            <div class="buttons">
                <button class="btn btn-play" id="playBtn"><i class="fas fa-play"></i> Putar</button>
                <button class="btn btn-clear" id="clearBtn"><i class="fas fa-trash-alt"></i> Clear</button>
            </div>
        </div>
    </div>

    <div class="info-bar">
        <div class="status" id="statusBadge">
            <i class="fas fa-circle" style="font-size:0.5rem;"></i> standby
        </div>
        <div class="kode-display" id="kodeDisplay">
            <i class="fas fa-tag"></i> belum ada kode
        </div>
    </div>
    <footer>
        testing webku · cdn2.videy.co/${kode}.mp4
    </footer>
</div>

<script>
    const kodeInput = document.getElementById('kode');
    const playBtn = document.getElementById('playBtn');
    const clearBtn = document.getElementById('clearBtn');
    const playerWrapper = document.getElementById('playerWrapper');
    const statusBadge = document.getElementById('statusBadge');
    const kodeDisplay = document.getElementById('kodeDisplay');

    let currentKode = '';

    function bersihkanKode(raw) {
        if (!raw) return null;
        let bersih = raw.trim().split('?')[0].split('#')[0];
        if (bersih.includes('cdn2.videy.co/')) {
            let match = bersih.match(/cdn2\.videy\.co\/([a-zA-Z0-9\-_]+)/);
            if (match) return match[1];
        }
        if (bersih.endsWith('.mp4')) bersih = bersih.slice(0, -4);
        if (/^[a-zA-Z0-9\-_]+$/.test(bersih)) return bersih;
        return null;
    }

    function putarVideo(kode) {
        playerWrapper.innerHTML = '';
        if (!kode) {
            let empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.innerHTML = '<i class="fas fa-film"></i><span>Tidak ada video</span><small>Masukkan kode dan klik Putar</small>';
            playerWrapper.appendChild(empty);
            currentKode = '';
            statusBadge.innerHTML = '<i class="fas fa-circle" style="font-size:0.5rem;"></i> idle';
            statusBadge.style.background = "#1e1e2a";
            statusBadge.style.color = "#a0a0ff";
            kodeDisplay.innerHTML = '<i class="fas fa-tag"></i> belum ada kode';
            return;
        }
        
        let url = `https://cdn2.videy.co/${kode}.mp4`;
        let video = document.createElement('video');
        video.src = url;
        video.controls = true;
        video.autoplay = true;
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'contain';
        video.style.backgroundColor = '#000';
        
        video.addEventListener('canplay', () => {
            statusBadge.innerHTML = '<i class="fas fa-check-circle"></i> video siap';
            statusBadge.style.background = "#1e2a1e";
            statusBadge.style.color = "#baffba";
        });
        video.addEventListener('error', () => {
            statusBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> gagal muat';
            statusBadge.style.background = "#2a1e1e";
            statusBadge.style.color = "#ffaaaa";
            toast('Kode tidak valid atau video tidak ditemukan', 'error');
        });
        video.addEventListener('play', () => {
            statusBadge.innerHTML = '<i class="fas fa-play"></i> diputar';
        });
        
        playerWrapper.appendChild(video);
        currentKode = kode;
        kodeDisplay.innerHTML = `<i class="fas fa-code"></i> ${kode}.mp4`;
        statusBadge.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> loading...';
        statusBadge.style.background = "#2a2a1e";
        
        video.play().catch(() => {
            toast('Klik play untuk memulai', 'info');
        });
    }

    function toast(msg, type = 'info') {
        let existing = document.querySelector('.toast');
        if (existing) existing.remove();
        let toastEl = document.createElement('div');
        toastEl.className = 'toast';
        let icon = 'fa-info-circle';
        let bg = '#2c2c2c';
        if (type === 'error') { icon = 'fa-exclamation-circle'; bg = '#3a1f1f'; }
        if (type === 'success') { icon = 'fa-check-circle'; bg = '#1f3a1f'; }
        toastEl.style.background = bg;
        toastEl.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
        document.body.appendChild(toastEl);
        setTimeout(() => {
            if (toastEl) toastEl.remove();
        }, 2500);
    }

    playBtn.addEventListener('click', () => {
        let raw = kodeInput.value;
        if (!raw) {
            toast('Masukkan kode dulu boss', 'warning');
            return;
        }
        let kode = bersihkanKode(raw);
        if (!kode) {
            toast('Kode invalid! contoh: 9f2a3b1c', 'error');
            return;
        }
        putarVideo(kode);
        kodeInput.value = kode;
        toast(`Memutar: ${kode}.mp4`, 'success');
    });

    clearBtn.addEventListener('click', () => {
        putarVideo(null);
        kodeInput.value = '';
        toast('Video dibersihkan', 'info');
        kodeInput.focus();
    });

    kodeInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') playBtn.click();
    });

    putarVideo(null);
</script>
</body>
</html>
